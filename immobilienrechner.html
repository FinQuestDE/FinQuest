<!DOCTYPE html>
<html lang="de" translate="no" class="notranslate">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google" content="notranslate">
  <title>Immobilien-Investment-Rechner – FinQuest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    @import url('https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap');
    :root{--p:#00D48A;--s:#1A1A2E;--acc:#FFD166;--hl:#FF6B6B;--surf:#16213E;--surf2:#0F3460;--txt:#F0F4FF;--muted:#8892B0;--border:rgba(0,212,138,0.2)}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--s);color:var(--txt);min-height:100vh}
    h1,h2,h3{font-family:'Clash Display','DM Sans',sans-serif}

    /* Number inputs */
    input[type=number]{-moz-appearance:textfield;-webkit-appearance:none}
    input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}

    /* Navbar */
    .navbar{position:sticky;top:0;z-index:200;background:rgba(26,26,46,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
    .navbar-inner{max-width:1280px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:64px}
    .logo{font-size:22px;font-weight:700;text-decoration:none;display:flex;align-items:center;gap:6px}
    .logo-fin{color:var(--txt)}.logo-quest{color:var(--p)}
    .badge{background:rgba(0,212,138,.12);border:1px solid var(--border);border-radius:50px;padding:5px 14px;font-size:12px;font-weight:700;color:var(--p)}
    .back-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:50px;border:1.5px solid rgba(240,244,255,.22);background:transparent;color:var(--txt);font-family:'DM Sans',sans-serif;font-weight:600;font-size:13px;text-decoration:none;transition:background .2s}
    .back-btn:hover{background:rgba(255,255,255,.06)}

    /* Page */
    .page{max-width:1280px;margin:0 auto;padding:28px 24px 80px}

    /* 2-col grid */
    .main-grid{display:grid;grid-template-columns:minmax(0,420px) minmax(0,1fr);gap:24px;align-items:start}
    @media(max-width:920px){.main-grid{grid-template-columns:1fr}}

    /* Cards */
    .card{background:var(--surf);border:1px solid rgba(255,255,255,.07);border-radius:18px;padding:20px;margin-bottom:14px}
    .card:last-child{margin-bottom:0}
    .card-title{font-size:13px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .card-badge{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);background:rgba(255,255,255,.05);border-radius:6px;padding:2px 8px;font-weight:600}

    /* Input field */
    .field{margin-bottom:14px}
    .field:last-child{margin-bottom:0}
    .field-label{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px;display:flex;align-items:center;gap:5px}
    .field-input{width:100%;background:var(--surf2);border:1.5px solid rgba(255,255,255,.08);border-radius:10px;padding:9px 12px;font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;color:var(--txt);outline:none;transition:border-color .2s}
    .field-input:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(0,212,138,.1)}
    .field-suffix{position:relative}
    .field-suffix .field-input{padding-right:38px}
    .field-suffix::after{content:attr(data-unit);position:absolute;right:12px;top:50%;transform:translateY(-50%);font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--muted);pointer-events:none}
    .field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .field-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

    /* Tooltip */
    .tip{position:relative;display:inline-flex;cursor:help}
    .tip-icon{width:15px;height:15px;border-radius:50%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);font-size:9px;display:inline-flex;align-items:center;justify-content:center;color:var(--muted);flex-shrink:0}
    .tip:hover .tip-box{display:block}
    .tip-box{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);width:210px;padding:9px 12px;background:#070714;border:1px solid rgba(0,212,138,.22);border-radius:10px;font-size:11px;line-height:1.6;color:var(--txt);box-shadow:0 8px 24px rgba(0,0,0,.7);z-index:200;white-space:normal;pointer-events:none;font-weight:400;font-family:'DM Sans',sans-serif}

    /* Infobox (annuität etc) */
    .infobox{background:var(--surf2);border-radius:10px;padding:12px 14px}
    .infobox-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .infobox-row:last-child{margin-bottom:0}
    .infobox-key{font-size:11px;color:var(--muted)}
    .infobox-val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700}
    .infobox-sub{display:flex;gap:16px;margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.05)}
    .infobox-sub-item{flex:1}
    .infobox-sub-key{font-size:10px;color:var(--muted);margin-bottom:2px}
    .infobox-sub-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700}

    /* Advanced toggle */
    .adv-toggle{width:100%;padding:12px 16px;background:rgba(255,255,255,.03);border:1.5px dashed rgba(255,255,255,.1);border-radius:14px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:all .2s;margin-bottom:14px}
    .adv-toggle:hover{border-color:rgba(0,212,138,.3);color:var(--p);background:rgba(0,212,138,.04)}
    .adv-toggle.open{border-color:rgba(0,212,138,.35);color:var(--p);background:rgba(0,212,138,.05)}
    .adv-section{display:none}
    .adv-section.open{display:block}
    .adv-arrow{transition:transform .25s}
    .adv-toggle.open .adv-arrow{transform:rotate(180deg)}

    /* Tax toggle pill */
    .toggle-row{display:flex;align-items:center;justify-content:space-between;background:var(--surf2);border-radius:10px;padding:10px 14px;margin-top:10px}
    .toggle-label{font-size:12px;font-weight:600}
    .toggle-pill{position:relative;width:40px;height:22px;border-radius:11px;background:rgba(255,255,255,.1);cursor:pointer;transition:background .2s;flex-shrink:0}
    .toggle-pill.on{background:var(--p)}
    .toggle-pill::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform .2s}
    .toggle-pill.on::after{transform:translateX(18px)}

    /* Deal Banner */
    .deal-banner{border-radius:18px;padding:18px 24px;margin-bottom:24px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;transition:all .3s}
    .deal-icon{font-size:32px;flex-shrink:0}
    .deal-label{font-family:'Clash Display','DM Sans',sans-serif;font-size:20px;font-weight:700;letter-spacing:.02em}
    .deal-msg{font-size:12px;opacity:.85;margin-top:2px;line-height:1.5}
    .deal-metrics{display:flex;gap:8px;flex-wrap:wrap;margin-left:auto}
    .deal-metric{text-align:center;padding:8px 12px;border-radius:10px;background:rgba(0,0,0,.2)}
    .deal-metric-val{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700}
    .deal-metric-key{font-size:9px;opacity:.6;margin-top:1px;white-space:nowrap}

    /* Cashflow big */
    .cf-card{border-radius:18px;padding:22px;margin-bottom:14px;text-align:center;border:2px solid transparent;transition:all .4s;background:var(--surf)}
    .cf-label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;opacity:.55;display:flex;align-items:center;justify-content:center;gap:5px}
    .cf-val{font-family:'JetBrains Mono',monospace;font-size:48px;font-weight:700;line-height:1;margin-bottom:6px;transition:color .3s}
    .cf-sub{font-size:11px;color:var(--muted);line-height:1.6}
    .cf-tax-note{font-size:10px;color:var(--p);margin-top:4px;font-weight:600}

    /* KPI grid */
    .kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
    .kpi-card{background:var(--surf);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:14px}
    .kpi-label{font-size:10px;color:var(--muted);margin-bottom:3px;display:flex;align-items:center;gap:4px}
    .kpi-val{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700}
    .kpi-sub{font-size:9px;color:var(--muted);margin-top:3px}

    /* Coverage */
    .cov-card{background:var(--surf);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:16px;margin-bottom:14px}
    .cov-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
    .cov-track{height:9px;background:var(--surf2);border-radius:5px;overflow:hidden;margin:7px 0}
    .cov-fill{height:100%;border-radius:5px;transition:width .5s cubic-bezier(.22,1,.36,1)}

    /* Tax info box */
    .tax-box{background:rgba(0,212,138,.05);border:1px solid rgba(0,212,138,.18);border-radius:12px;padding:14px;margin-top:12px}
    .tax-box-title{font-size:11px;font-weight:700;color:var(--p);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
    .tax-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:12px}
    .tax-row:last-child{margin-bottom:0;padding-top:6px;border-top:1px solid rgba(0,212,138,.15);margin-top:4px}
    .tax-key{color:var(--muted)}
    .tax-val{font-family:'JetBrains Mono',monospace;font-weight:700}

    /* Chart cards */
    .chart-card{background:var(--surf);border:1px solid rgba(255,255,255,.07);border-radius:18px;padding:20px;margin-bottom:14px}
    .chart-title{font-size:13px;font-weight:700;margin-bottom:3px}
    .chart-sub{font-size:11px;color:var(--muted);margin-bottom:16px;line-height:1.4}

    /* Year summary */
    .yr-row{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}
    .yr-box{flex:1 1 90px;border-radius:10px;padding:10px 12px}
    .yr-key{font-size:10px;color:#8892B0;margin-bottom:2px}
    .yr-val{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700}

    /* Rate selector buttons */
    .rate-btns{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
    .rate-btn{padding:4px 10px;border-radius:50px;border:1px solid rgba(255,255,255,.1);background:transparent;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
    .rate-btn:hover,.rate-btn.active{background:rgba(0,212,138,.12);border-color:var(--border);color:var(--p)}

    /* Disclaimer */
    .disclaimer{font-size:11px;color:var(--muted);line-height:1.6;padding:12px 14px;background:rgba(255,255,255,.02);border-radius:10px;border:1px solid rgba(255,255,255,.05);margin-top:14px}

    /* Animations */
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .fade{animation:fadeUp .4s ease both}

    /* Scrollbar */
    ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--surf2)}::-webkit-scrollbar-thumb{background:rgba(0,212,138,.3);border-radius:10px}
  </style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="dashboard.html" class="logo"><span class="logo-fin">Fin</span><span class="logo-quest">Quest</span></a>
    <div style="display:flex;align-items:center;gap:12px">
      <span class="badge">🏠 Immobilien-Rechner</span>
      <a href="dashboard.html" class="back-btn">← Dashboard</a>
    </div>
  </div>
</nav>

<div id="root"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

<script>
/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
const state = {
  /* Kaufdaten */
  kaufpreis:       300000,
  nebenkosten:     10,
  /* Finanzierung */
  eigenkapital:    80000,
  zinssatz:        3.5,
  tilgung:         2,
  /* Bewirtschaftung */
  kaltmiete:       1200,
  nichtUmlag:      200,
  instand:         100,
  /* Advanced – Steuer */
  grenzsteuersatz: 30,
  gebaeudeanteil:  70,
  afaSatz:         2,
  steuerModus:     false,   // Cashflow inkl. Steuereffekt
  /* Advanced – Mietsteigerung */
  mietSteigerung:  0,
};

/* ═══════════════════════════════════════════
   FORMATTER
═══════════════════════════════════════════ */
const N = (n,d=0) => isNaN(n)||!isFinite(n)?'–':new Intl.NumberFormat('de-DE',{minimumFractionDigits:d,maximumFractionDigits:d}).format(n);
const E = (n,d=0) => N(n,d)+' €';
const P = (n,d=1) => N(n,d)+' %';
const M = n => N(Math.round(n))+' €/Mo';

/* ═══════════════════════════════════════════
   CALC HELPERS
═══════════════════════════════════════════ */
function calcBase(s) {
  const gesamtK  = s.kaufpreis * (1 + s.nebenkosten/100);
  const darlehen = Math.max(0, gesamtK - s.eigenkapital);
  const ann      = darlehen * (s.zinssatz + s.tilgung) / 100 / 12;
  const zinsMo   = darlehen * s.zinssatz / 100 / 12;
  const tilgMo   = Math.max(0, ann - zinsMo);
  const jahrM    = s.kaltmiete * 12;
  const jahrB    = (s.nichtUmlag + s.instand) * 12;
  const brutto   = s.kaufpreis > 0 ? (jahrM / s.kaufpreis) * 100 : 0;
  const netto    = gesamtK > 0 ? ((jahrM - jahrB) / gesamtK) * 100 : 0;
  const gKosten  = ann + s.nichtUmlag + s.instand;

  /* AfA */
  const afaJahr  = s.kaufpreis * s.gebaeudeanteil/100 * s.afaSatz/100;
  const afaMo    = afaJahr / 12;

  /* Steuerliches Ergebnis V+V (pro Monat) */
  /* Einkünfte – abzugsfähige Aufwendungen = steuerpfl. Ergebnis */
  const afaStSpar  = afaMo  * s.grenzsteuersatz / 100;
  const zinsStSpar = zinsMo * s.grenzsteuersatz / 100;
  const steuerEffektMo = afaStSpar + zinsStSpar;

  /* Cashflow */
  const cfVorSteuer   = s.kaltmiete - ann - s.nichtUmlag - s.instand;
  const cfNachSteuer  = cfVorSteuer + steuerEffektMo;
  const cashflow      = s.steuerModus ? cfNachSteuer : cfVorSteuer;

  /* Reinertrag (ohne Tilgung) für EK-Rendite – immer vor Steuer */
  const reinertragVor  = s.kaltmiete - zinsMo - s.nichtUmlag - s.instand;

  const ekRend   = s.eigenkapital > 0 ? (reinertragVor * 12 / s.eigenkapital) * 100 : 0;
  const deckung  = gKosten > 0 ? Math.min(1, s.kaltmiete / gKosten) : 1;
  const verv     = s.kaltmiete > 0 ? s.kaufpreis / (s.kaltmiete * 12) : 0;
  const rating   = cashflow >= 0 && netto >= 4 ? 'green' : cashflow >= -300 && netto >= 2.5 ? 'yellow' : 'red';

  return {
    gesamtK, darlehen, ann, zinsMo, tilgMo,
    brutto, netto, cashflow, cfVorSteuer, cfNachSteuer,
    ekRend, gKosten, deckung, verv, rating,
    afaJahr, afaMo, steuerEffektMo,
    zinsStSpar, afaStSpar,
  };
}

/* 10-year projection data */
function calcYears(s) {
  const base = calcBase(s);
  const rows = [];
  let rest = base.darlehen;
  let rent = s.kaltmiete;

  for (let y = 0; y <= 10; y++) {
    const zinsMo_y   = rest * s.zinssatz / 100 / 12;
    const ann_y      = base.ann; // fixed annuity
    const tilgMo_y   = Math.max(0, ann_y - zinsMo_y);
    const cfVor_y    = rent - ann_y - s.nichtUmlag - s.instand;
    const afaMo      = base.afaMo;
    const afaStSpar_y  = afaMo      * s.grenzsteuersatz / 100;
    const zinsStSpar_y = zinsMo_y   * s.grenzsteuersatz / 100;
    const cfNach_y   = cfVor_y + afaStSpar_y + zinsStSpar_y;

    rows.push({
      label:    y === 0 ? 'Start' : 'J'+y,
      Restschuld: Math.round(Math.max(0, rest)),
      Getilgt:    Math.round(Math.max(0, base.darlehen - rest)),
      cfVor:    Math.round(cfVor_y),
      cfNach:   Math.round(cfNach_y),
      rent:     Math.round(rent),
      zinsMo:   Math.round(zinsMo_y),
    });

    if (y < 10) {
      /* advance one year */
      const jz  = Math.max(0, rest) * s.zinssatz / 100;
      rest -= (ann_y * 12 - jz);
      rest = Math.max(0, rest);
      rent = rent * (1 + s.mietSteigerung / 100);
    }
  }
  return rows;
}

/* ═══════════════════════════════════════════
   COLORS
═══════════════════════════════════════════ */
const kColor = (v, hi, lo) => v >= hi ? '#00D48A' : v >= lo ? '#FFD166' : '#FF6B6B';
const cfColor = cf => cf >= 0 ? '#00D48A' : cf >= -300 ? '#FFD166' : '#FF6B6B';
const RATING = {
  green:  {c:'#00D48A',bg:'rgba(0,212,138,.09)',  bd:'rgba(0,212,138,.38)', icon:'✅',lab:'DEAL',   msg:'Positiver Cashflow & starke Rendite – dieses Investment lohnt sich!'},
  yellow: {c:'#FFD166',bg:'rgba(255,209,102,.09)',bd:'rgba(255,209,102,.38)',icon:'⚠️',lab:'NEUTRAL',msg:'Solider Vermögensaufbau durch Tilgung, aber kaum bis kein Cashflow.'},
  red:    {c:'#FF6B6B',bg:'rgba(255,107,107,.09)',bd:'rgba(255,107,107,.38)',icon:'❌',lab:'NO DEAL',msg:'Hohe monatliche Belastung – Zuzahlung nötig. Investment kritisch prüfen!'},
};

/* ═══════════════════════════════════════════
   DOM HELPERS
═══════════════════════════════════════════ */
const $ = id => document.getElementById(id);
const setText  = (id,t)  => { const el=$(id); if(el) el.textContent=t; };
const setStyle = (id,st) => { const el=$(id); if(el) Object.assign(el.style,st); };
const setClass = (id,c,add) => { const el=$(id); if(!el) return; add?el.classList.add(c):el.classList.remove(c); };

/* ═══════════════════════════════════════════
   MAIN RENDER (DOM updates)
═══════════════════════════════════════════ */
function render() {
  const s = state;
  const r = calcBase(s);
  const cfg = RATING[r.rating];
  const cfc = cfColor(r.cashflow);
  const years = calcYears(s);

  /* Deal Banner */
  setStyle('deal-banner',{background:cfg.bg,border:`2px solid ${cfg.bd}`});
  setText('deal-icon',cfg.icon);
  setStyle('deal-label',{color:cfg.c}); setText('deal-label',cfg.lab);
  setText('deal-msg',cfg.msg);
  setStyle('dm-cf',{color:cfColor(r.cashflow)});    setText('dm-cf',M(r.cashflow));
  setStyle('dm-netto',{color:kColor(r.netto,4,2.5)});setText('dm-netto',P(r.netto));
  setStyle('dm-ek',{color:kColor(r.ekRend,5,0)});   setText('dm-ek',P(r.ekRend));

  /* Annuität box */
  setText('ann-total', M(r.ann));
  setText('ann-zins',  M(r.zinsMo));
  setText('ann-tilg',  M(r.tilgMo));
  setText('badge-gesamtk', E(r.gesamtK));
  setText('badge-darlehen', E(r.darlehen));

  /* Cashflow card */
  const cfl = r.cfVorSteuer;
  const cfDisplay = s.steuerModus ? r.cfNachSteuer : r.cfVorSteuer;
  setStyle('cf-card',{border:`2px solid ${cfc}55`,boxShadow:`0 0 36px ${cfc}15`});
  setStyle('cf-val',{color:cfc});
  setText('cf-val',(cfDisplay>=0?'+':'')+N(Math.round(cfDisplay))+' €/Mo');
  setText('cf-miete', M(s.kaltmiete));
  setText('cf-ann',   M(r.ann));
  setText('cf-kost',  M(s.nichtUmlag+s.instand));
  const taxNote = $('cf-tax-note');
  if(taxNote){
    taxNote.style.display = s.steuerModus ? 'block' : 'none';
    taxNote.textContent = s.steuerModus
      ? `inkl. Steuerersparnisse (AfA + Zinsen): +${M(r.steuerEffektMo)}`
      : '';
  }

  /* KPIs */
  setStyle('kpi-brutto',{color:kColor(r.brutto,5,3.5)});  setText('kpi-brutto',P(r.brutto));
  setStyle('kpi-netto', {color:kColor(r.netto,4,2.5)});   setText('kpi-netto', P(r.netto));
  setStyle('kpi-ek',    {color:kColor(r.ekRend,5,0)});    setText('kpi-ek',    P(r.ekRend));
  setText('kpi-ek-sub','EK: '+E(s.eigenkapital));
  const vv = r.verv;
  setStyle('kpi-verv',{color:vv>0&&vv<=25?'#00D48A':vv<=30?'#FFD166':'#FF6B6B'});
  setText('kpi-verv', vv>0?N(vv,1)+'x':'–');

  /* Coverage */

    ? `Miete in J10: ${E(Math.round(s.kaltmiete * Math.pow(1+s.mietSteigerung/100,10)))}`

  );

  /* Year boxes */
  setText('yr-rest',    E(years[10]?.Restschuld??0));
  setText('yr-getilgt', E(years[10]?.Getilgt??0));

/* ═══════════════════════════════════════════
   CHART.JS CHARTS
═══════════════════════════════════════════ */
const _charts = {};

const CJ_DEFAULTS = {
  plugins: { legend: { labels: { color:'#8892B0', font:{size:11}, boxWidth:10 } } },
  scales: {
    x: { ticks:{color:'#8892B0',font:{size:10}}, grid:{color:'rgba(255,255,255,.04)'}, border:{display:false} },
    y: { ticks:{color:'#8892B0',font:{size:10}}, grid:{color:'rgba(255,255,255,.04)'}, border:{display:false} },
  }
};

function mkCanvas(id) {
  const el = $(id);
  if (!el) return null;
  el.innerHTML = '';
  const c = document.createElement('canvas');
  c.style.width  = '100%';
  c.style.height = '100%';
  el.appendChild(c);
  return c;
}

function destroyChart(key) {
  if (_charts[key]) { try { _charts[key].destroy(); } catch(e){} delete _charts[key]; }
}

function renderCharts(r, years, s) {

  /* ── PIE CHART: Kostenverteilung ── */
  const total = r.zinsMo + r.tilgMo + s.instand + s.nichtUmlag;
  const pieData = [
    {name:'Zinsen',         value:Math.round(r.zinsMo),  color:'#FF6B6B'},
    {name:'Tilgung',        value:Math.round(r.tilgMo),  color:'#00D48A'},
    {name:'Instandhaltung', value:s.instand,              color:'#FFD166'},
    {name:'Verwaltung/NK',  value:s.nichtUmlag,           color:'#88CFFF'},
  ].filter(d=>d.value>0);

  destroyChart('pie');
  const pieCanvas = mkCanvas('pie-root');
  if (pieCanvas) {
    _charts['pie'] = new Chart(pieCanvas, {
      type: 'doughnut',
      data: {
        labels: pieData.map(d=>d.name),
        datasets: [{ data: pieData.map(d=>d.value), backgroundColor: pieData.map(d=>d.color), borderWidth:0, hoverOffset:6 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false, cutout: '60%',
        plugins: {
          legend: { position:'bottom', labels:{ color:'#8892B0', font:{size:11}, boxWidth:10, padding:12 } },
          tooltip: { callbacks: { label: ctx => ` ${N(ctx.raw)} €/Mo  (${total>0?N(ctx.raw/total*100,0):0}%)` } }
        }
      }
    });
  }

  /* ── BAR CHART: Vermögensaufbau ── */
  destroyChart('bar');
  const barCanvas = mkCanvas('bar-root');
  if (barCanvas) {
    _charts['bar'] = new Chart(barCanvas, {
      type: 'bar',
      data: {
        labels: years.map(y=>y.label),
        datasets: [
          { label:'Restschuld', data: years.map(y=>y.Restschuld), backgroundColor:'rgba(255,107,107,.75)', borderRadius:{topLeft:0,topRight:0,bottomLeft:3,bottomRight:3}, stack:'a' },
          { label:'Getilgt',    data: years.map(y=>y.Getilgt),    backgroundColor:'rgba(0,212,138,.9)',    borderRadius:{topLeft:3,topRight:3,bottomLeft:0,bottomRight:0}, stack:'a' },
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: CJ_DEFAULTS.plugins.legend,
          tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: ${N(ctx.raw)} €` } }
        },
        scales: {
          x: { ...CJ_DEFAULTS.scales.x, stacked: true },
          y: { ...CJ_DEFAULTS.scales.y, stacked: true, ticks:{ ...CJ_DEFAULTS.scales.y.ticks, callback: v => N(v/1000)+'k' } }
        }
      }
    });
  }

  /* ── LINE CHART: Cashflow-Entwicklung 10 Jahre ── */
  destroyChart('cf');
  const cfCanvas = mkCanvas('cf-root');
  if (cfCanvas) {
    const cfDatasets = [
      { label:'Cashflow (vor Steuer)', data: years.map(y=>y.cfVor),  borderColor:'#FFD166', backgroundColor:'rgba(255,209,102,.08)', fill:true, tension:.4, pointRadius:3, pointBackgroundColor:'#FFD166' }
    ];
    if (s.steuerModus) {
      cfDatasets.push({ label:'Cashflow (nach Steuer)', data: years.map(y=>y.cfNach), borderColor:'#00D48A', backgroundColor:'rgba(0,212,138,.08)', fill:true, tension:.4, pointRadius:3, pointBackgroundColor:'#00D48A' });
    }
    _charts['cf'] = new Chart(cfCanvas, {
      type: 'line',
      data: { labels: years.map(y=>y.label), datasets: cfDatasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: CJ_DEFAULTS.plugins.legend,
          tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: ${ctx.raw>=0?'+':''}${N(ctx.raw)} €/Mo` } },
          annotation: {}
        },
        scales: {
          x: CJ_DEFAULTS.scales.x,
          y: { ...CJ_DEFAULTS.scales.y, ticks:{ ...CJ_DEFAULTS.scales.y.ticks, callback: v=>(v>=0?'+':'')+N(v) } }
        }
      }
    });
  }

  /* ── LINE+BAR CHART: Zinslast sinkt – Cashflow steigt ── */
  destroyChart('zins');
  const zinsCanvas = mkCanvas('zins-root');
  if (zinsCanvas) {
    _charts['zins'] = new Chart(zinsCanvas, {
      type: 'bar',
      data: {
        labels: years.map(y=>y.label),
        datasets: [
          { type:'bar',  label:'Zinsen /Mo', data: years.map(y=>y.zinsMo), backgroundColor:'rgba(255,107,107,.5)', borderRadius:3, yAxisID:'y' },
          { type:'line', label: s.steuerModus ? 'Cashflow (nach Steuer)' : 'Cashflow (vor Steuer)', data: years.map(y=> s.steuerModus ? y.cfNach : y.cfVor), borderColor:'#00D48A', backgroundColor:'rgba(0,212,138,.08)', fill:true, tension:.4, pointRadius:3, pointBackgroundColor:'#00D48A', yAxisID:'y' },
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: CJ_DEFAULTS.plugins.legend,
          tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: ${ctx.raw>=0?'+':''}${N(ctx.raw)} €` } }
        },
        scales: {
          x: CJ_DEFAULTS.scales.x,
          y: { ...CJ_DEFAULTS.scales.y, ticks:{ ...CJ_DEFAULTS.scales.y.ticks, callback: v=>N(v)+'€' } }
        }
      }
    });
  }
}

/* ═══════════════════════════════════════════
   INPUT WIRING
═══════════════════════════════════════════ */
function bind(key, id) {
  const el = $(id); if(!el) return;
  el.addEventListener('input', () => {
    const v = parseFloat(el.value);
    if(!isNaN(v) && isFinite(v)) { state[key] = v; render(); }
  });
}
function bindCheck(key, id) {
  const el=$(id); if(!el) return;
  el.addEventListener('change', () => { state[key]=el.checked; render(); });
}

      <!-- COVERAGE -->
      <div class="cov-card fade" style="animation-delay:.10s">
        <div class="cov-title">📊 Gesamtkostendeckung</div>
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted)">
          <span>Einnahmen: <strong class="notranslate" id="cov-ein" style="color:var(--p)">–</strong></span>
          <span>Kosten: <strong class="notranslate" id="cov-kost" style="color:var(--acc)">–</strong></span>
        </div>
        <div class="cov-track"><div class="cov-fill" id="cov-fill" style="width:50%;background:var(--p)"></div></div>
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted)">
          <span class="notranslate" id="cov-pct">–</span>
          <span class="notranslate" id="cov-status">–</span>
        </div>
      </div>

      <!-- CHART: Cashflow-Entwicklung 10 Jahre -->
      <div class="chart-card fade" style="animation-delay:.12s">
        <div class="chart-title">📈 Cashflow-Entwicklung – 10 Jahre</div>
        <div class="chart-sub">Wie entwickelt sich dein monatlicher Cashflow über die Zeit? (Zinslast sinkt, Miete steigt)</div>
        <div id="cf-root" style="height:220px;min-height:220px"></div>
      </div>

      <!-- CHART: Monatliche Kostenverteilung -->
      <div class="chart-card fade" style="animation-delay:.15s">
        <div class="chart-title">💸 Monatliche Kostenverteilung</div>
        <div class="chart-sub">Wohin fließt deine Annuität? Zinsen sind "verlorenes Geld", Tilgung ist Vermögensaufbau. Zusammen mit Verwaltung und Instandhaltung ergibt sich dein Gesamtaufwand – dem du die Mieteinnahmen gegenüberstellst.</div>
        <div id="pie-root" style="height:210px;min-height:210px"></div>
        <div style="display:flex;align-items:center;justify-content:space-between;background:var(--surf2);border-radius:10px;padding:9px 14px;margin-top:8px;font-size:11px">
          <span style="color:var(--muted)">🏠 Kaltmiete (Einnahmen)</span>
          <strong class="notranslate" id="pie-miete" style="font-family:'JetBrains Mono',monospace;color:var(--p)">–</strong>
          <span class="notranslate" id="pie-status" style="font-weight:700">–</span>
        </div>
      </div>

      <!-- CHART: Zinslast + Cashflow -->
      <div class="chart-card fade" style="animation-delay:.17s">
        <div class="chart-title">📉 Zinslast vs. Cashflow – 10 Jahre</div>
        <div class="chart-sub">Die Zinslast sinkt mit jeder Tilgung automatisch. Der Cashflow-Verlauf hängt davon ab, ob du eine jährliche Mietsteigerung eingestellt hast – ohne Steigerung bleibt er konstant.</div>
        <div id="zins-root" style="height:200px;min-height:200px"></div>
      </div>

      <!-- CHART: Vermögensaufbau -->
      <div class="chart-card fade" style="animation-delay:.19s">
        <div class="chart-title">🏗️ Vermögensaufbau – 10 Jahre</div>
        <div class="chart-sub">Restschuld (rot) sinkt → getilgter Anteil (grün) wächst. Dein Eigenkapital in der Immobilie nimmt zu.</div>
        <div id="bar-root" style="height:200px;min-height:200px"></div>
        <div class="yr-row">
          <div class="yr-box" style="background:rgba(255,107,107,.08);border:1px solid rgba(255,107,107,.2)">
            <div class="yr-key">Restschuld nach 10 J.</div>
            <div class="yr-val notranslate" id="yr-rest" style="color:#FF6B6B">–</div>
          </div>
          <div class="yr-box" style="background:rgba(0,212,138,.08);border:1px solid rgba(0,212,138,.2)">
            <div class="yr-key">Getilgt nach 10 J.</div>
            <div class="yr-val notranslate" id="yr-getilgt" style="color:var(--p)">–</div>
          </div>
          <div class="yr-box" style="background:rgba(255,209,102,.08);border:1px solid rgba(255,209,102,.2)">
            <div class="yr-key">EK gesamt (EK + Tilgung)</div>
            <div class="yr-val notranslate" id="yr-ek" style="color:var(--acc)">–</div>
          </div>
        </div>
      </div>

      <div class="disclaimer">
        ⚠️ <strong>Kein Finanzrat:</strong> Alle Berechnungen sind vereinfacht und ohne Gewähr.
        Leerstand, individuelle Steueroptimierung, Inflation und Wertsteigerungen sind nicht berücksichtigt.
        Bitte konsultiere einen Steuerberater und Finanzberater für persönliche Entscheidungen.
      </div>

    </div>
    <!-- end right col -->
  </div>
  <!-- end main-grid -->
</div>
`;

═══════════════════════════════════════════ */
bind('kaufpreis',       'f-kaufpreis');
bind('nebenkosten',     'f-nebenkosten');
bind('eigenkapital',    'f-eigenkapital');
bind('zinssatz',        'f-zinssatz');
bind('tilgung',         'f-tilgung');
bind('kaltmiete',       'f-kaltmiete');
bind('nichtUmlag',      'f-nichtumlag');
bind('instand',         'f-instand');
bind('grenzsteuersatz', 'f-grenz');
bind('gebaeudeanteil',  'f-gebaeudeanteil');
bind('afaSatz',         'f-afasatz');
bind('mietSteigerung',  'f-mietsteigerung');

/* ═══════════════════════════════════════════
   TOGGLE FUNCTIONS
═══════════════════════════════════════════ */
function toggleAdv() {
  const sec  = $('adv-section');
  const btn  = $('adv-toggle');
  const open = sec.classList.toggle('open');
  btn.classList.toggle('open', open);
}

function toggleSteuerModus() {
  state.steuerModus = !state.steuerModus;
  render();
}

function setRate(v) {
  state.grenzsteuersatz = v;
  $('f-grenz').value = v;
  document.querySelectorAll('.rate-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.textContent) === v);
  });
  render();
}

/* ═══════════════════════════════════════════
   PATCH RENDER for pie status
═══════════════════════════════════════════ */
const _baseRender = render;
window.render = function() {
  _baseRender();
  const r = calcBase(state);
  setText('pie-miete',  M(state.kaltmiete));
  setText('pie-status', r.cashflow>=0?'▲ Überschuss':'▼ Unterdeckung');
  setStyle('pie-status',{color: r.cashflow>=0?'#00D48A':'#FF6B6B'});
};

/* ── INITIAL RENDER ── */
render();
</script>

<script src="lang.js"></script>
<script src="theme.js"></script>
</body>
</html>
